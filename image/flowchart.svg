<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">代码注释转中文处理流程图</title>
  <desc id="desc">从 code_input 扫描源码，按阈值判断是否拆分，大文件拆分后统一翻译，最后合并输出到 code_output。</desc>
  <defs>
    <style>
      .title { font: 700 28px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 20px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #111827; }
      .small { font: 500 16px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #374151; }
      .box { fill: #f8fafc; stroke: #2563eb; stroke-width: 2.5; rx: 14; ry: 14; }
      .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; }
      .out { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; rx: 14; ry: 14; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .note { font: 600 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="title">代码注释转中文处理流程图</text>

  <rect x="80" y="90" width="180" height="68" class="box" />
  <text x="170" y="120" text-anchor="middle" class="label">code_input/</text>
  <text x="170" y="145" text-anchor="middle" class="small">待处理源码目录</text>

  <rect x="330" y="90" width="250" height="68" class="box" />
  <text x="455" y="120" text-anchor="middle" class="label">扫描源码文件</text>
  <text x="455" y="145" text-anchor="middle" class="small">.c / .h / .cpp</text>

  <polygon points="700,80 850,124 700,168 550,124" class="decision" />
  <text x="700" y="118" text-anchor="middle" class="label">文件大小是否</text>
  <text x="700" y="142" text-anchor="middle" class="label">超过阈值</text>

  <rect x="500" y="240" width="210" height="70" class="box" />
  <text x="605" y="270" text-anchor="middle" class="label">直接进入翻译</text>
  <text x="605" y="295" text-anchor="middle" class="small">小文件流程</text>

  <rect x="800" y="240" width="260" height="70" class="box" />
  <text x="930" y="270" text-anchor="middle" class="label">拆分到 temp/code_split/</text>
  <text x="930" y="295" text-anchor="middle" class="small">大文件先拆分</text>

  <rect x="640" y="370" width="280" height="70" class="box" />
  <text x="780" y="400" text-anchor="middle" class="label">调用大模型翻译/补充中文注释</text>
  <text x="780" y="425" text-anchor="middle" class="small">按提示词处理注释</text>

  <rect x="640" y="470" width="280" height="70" class="box" />
  <text x="780" y="500" text-anchor="middle" class="label">输出到 temp/code_split_output/</text>
  <text x="780" y="525" text-anchor="middle" class="small">保存翻译后的分片结果</text>

  <rect x="980" y="370" width="160" height="70" class="box" />
  <text x="1060" y="400" text-anchor="middle" class="label">合并结果</text>
  <text x="1060" y="425" text-anchor="middle" class="small">merge</text>

  <rect x="980" y="470" width="160" height="70" class="out" />
  <text x="1060" y="500" text-anchor="middle" class="label">code_output/</text>
  <text x="1060" y="525" text-anchor="middle" class="small">最终输出目录</text>

  <path d="M260 124 L330 124" class="arrow" />
  <path d="M580 124 L550 124" class="arrow" />
  <path d="M655 162 L625 240" class="arrow" />
  <path d="M780 162 L900 240" class="arrow" />
  <path d="M605 310 L730 370" class="arrow" />
  <path d="M930 310 L830 370" class="arrow" />
  <path d="M920 405 L980 405" class="arrow" />
  <path d="M780 440 L780 470" class="arrow" />
  <path d="M1060 440 L1060 470" class="arrow" />

  <text x="620" y="205" class="note">否</text>
  <text x="840" y="205" class="note">是</text>
</svg>
